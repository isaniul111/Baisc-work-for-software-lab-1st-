```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dark Theme Website</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#0f172a;
color:#e5e7eb;
}

/* Navbar */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
background:#020617;
border-bottom:1px solid #1e293b;
}

.logo{
font-size:24px;
font-weight:bold;
color:#38bdf8;
}

nav ul{
list-style:none;
display:flex;
gap:30px;
}

nav ul li a{
text-decoration:none;
color:#cbd5f5;
font-size:16px;
transition:0.3s;
}

nav ul li a:hover{
color:#38bdf8;
}

/* Hero Section */

.hero{
height:90vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
}

.hero h1{
font-size:60px;
margin-bottom:15px;
color:white;
}

.hero p{
max-width:600px;
font-size:18px;
color:#94a3b8;
margin-bottom:30px;
}

/* Buttons */

.buttons{
display:flex;
gap:20px;
}

.btn{
padding:12px 28px;
border-radius:30px;
border:none;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.primary{
background:#38bdf8;
color:#020617;
}

.primary:hover{
background:#0ea5e9;
}

.secondary{
background:transparent;
border:2px solid #38bdf8;
color:#38bdf8;
}

.secondary:hover{
background:#38bdf8;
color:#020617;
}

/* Footer */

footer{
text-align:center;
padding:15px;
background:#020617;
border-top:1px solid #1e293b;
color:#94a3b8;
}

</style>
</head>

<body>

<nav>
<div class="logo">DarkSite</div>

<ul>
<li><a href="#">Home</a></li>
<li><a href="#">About</a></li>
<li><a href="#">Services</a></li>
<li><a href="#">Contact</a></li>
</ul>
</nav>

<section class="hero">

<h1>Dark Modern Website</h1>

<p>
A beautiful dark themed website design. Clean, modern and perfect for portfolios, startups or personal websites.
</p>

<div class="buttons">
<button class="btn primary">Get Started</button>
<button class="btn secondary">Learn More</button>
</div>

</section>

<footer>
© 2026 DarkSite. All rights reserved.
</footer>

</body>
</html>
```
