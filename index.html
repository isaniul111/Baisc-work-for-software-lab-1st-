<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beautiful Index Page</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background: linear-gradient(135deg,#6a11cb,#2575fc);
color:white;
height:100vh;
display:flex;
flex-direction:column;
}

/* Navbar */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 50px;
background:rgba(0,0,0,0.2);
backdrop-filter:blur(10px);
}

.logo{
font-size:24px;
font-weight:bold;
}

nav ul{
display:flex;
list-style:none;
gap:25px;
}

nav ul li a{
text-decoration:none;
color:white;
font-size:16px;
transition:0.3s;
}

nav ul li a:hover{
color:#ffd369;
}

/* Hero Section */

.hero{
flex:1;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
flex-direction:column;
padding:20px;
}

.hero h1{
font-size:55px;
margin-bottom:15px;
}

.hero p{
font-size:18px;
margin-bottom:30px;
max-width:600px;
}

/* Buttons */

.buttons{
display:flex;
gap:20px;
}

.btn{
padding:12px 28px;
border:none;
border-radius:30px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.btn-primary{
background:white;
color:#2575fc;
}

.btn-primary:hover{
background:#ffd369;
color:black;
}

.btn-secondary{
background:transparent;
border:2px solid white;
color:white;
}

.btn-secondary:hover{
background:white;
color:#2575fc;
}

footer{
text-align:center;
padding:15px;
background:rgba(0,0,0,0.2);
}

</style>
</head>

<body>

<nav>
<div class="logo">MyWebsite</div>

<ul>
<li><a href="#">Home</a></li>
<li><a href="#">About</a></li>
<li><a href="#">Services</a></li>
<li><a href="#">Contact</a></li>
</ul>
</nav>

<section class="hero">

<h1>Welcome to My Website</h1>
<p>
Create beautiful websites with modern design.
This is a simple and stylish index page layout.
</p>

<div class="buttons">
<button class="btn btn-primary">Get Started</button>
<button class="btn btn-secondary">Learn More</button>
</div>

</section>

<footer>
© 2026 MyWebsite | All Rights Reserved
</footer>

</body>
</html>
